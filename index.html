 solid #6ee7b7}.badge-B{background:#fef3c7;color:#92400e;border:1.5px solid #fcd34d}.badge-U{background:#f3e8ff;color:#7c3aed;border:1.5px solid #c4b5fd}.badge-R{background:#fee2e2;color:#b91c1c;border:1.5px solid #fca5a5}.badge-J{background:#e0f2fe;color:#0369a1;border:1.5px solid #7dd3fc}.progress-bar{height:8px;border-radius:4px;background:#e2e8f0;overflow:hidden}.progress-fill{height:100%;border-radius:4px;background:#1e293b;transition:width .3s}.route-item{padding:8px 10px;border-radius:8px;margin-bottom:4px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border:1px solid #f1f5f9}.route-item.current{background:#eff6ff;border:2px solid #3b82f6}.route-item.completed{opacity:.5}.route-item-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.route-item-loc{font-size:11px;color:#64748b;font-family:monospace}.qty-display{display:flex;align-items:center;justify-content:center;gap:4px;padding:14px;border-radius:10px;font-family:monospace}.qty-adj{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:8px}.qty-btn{width:44px;height:44px;border-radius:10px;border:2px solid #e2e8f0;background:#fff;font-size:22px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center}.qty-manual{width:60px;text-align:center;font-size:18px;font-weight:700;font-family:monospace;border:2px solid #e2e8f0;border-radius:8px;padding:8px 4px}.location-big{font-size:20px;font-weight:700;font-family:monospace;color:#1e293b}.scan-result{padding:10px;border-radius:8px;margin-top:8px;font-size:13px;text-align:center;font-weight:600}.scan-ok{background:#f0fdf4;color:#16a34a;border:1px solid #86efac}.scan-fail{background:#fef2f2;color:#dc2626;border:1px solid #fca5a5}.cart-card{padding:20px;border-radius:12px;margin-bottom:12px;cursor:pointer;border:3px solid #e2e8f0;text-align:center;transition:all .15s}.cart-card:active{transform:scale(.97)}.cart-card.taken{opacity:.4;cursor:not-all <script>
/* ═══════════ FIREBASE ═══════════ */
firebase.initializeApp({apiKey:"AIzaSyBA_nMeugv0lSxjVm1il1iJo7v33Fs__X8",authDomain:"hyllytysappi.firebaseapp.com",databaseURL:"https://hyllytysappi-default-rtdb.europe-west1.firebasedatabase.app",projectId:"hyllytysappi",storageBucket:"hyllytysappi.firebasestorage.app",messagingSenderId:"312430303554",appId:"1:312430303554:web:1fa95efa74fa370bdc10db"});
const db=firebase.database();
const sessionId=Date.now().toString(36)+Math.random().toString(36).slice(2,6);
let dbRef=null,fbData={scannedBoxes:{},cartsTaken:{}};

function todayKey(){return new Date().toISOString().slice(0,10)}
function initFirebase(){
  dbRef=db.ref('sessions/'+todayKey());
  dbRef.on('value',snap=>{
    const val=snap.val()||{};
    fbData.scannedBoxes=val.scannedBoxes||{};
    fbData.cartsTaken=val.cartsTaken||{};
    if(S.phase==='scan'||S.phase==='cartSelect')render();
  });
}
function fbAddBox(sscc,items){if(dbRef)dbRef.child('scannedBoxes/'+sscc.replace(/[.#$/[\]]/g,'_')).set({sscc,items,by:sessionId,t:Date.now()})}
function fbTakeCart(id){if(dbRef)dbRef.child('cartsTaken/'+id).set({by:sessionId,t:Date.now()})}
function fbReleaseCart(id){if(dbRef)dbRef.child('cartsTaken/'+id).remove()}
function fbIsBoxScanned(sscc){return!!fbData.scannedBoxes[sscc.replace(/[.#$/[\]]/g,'_')]}
function fbScannedCount(){return Object.keys(fbData.scannedBoxes).length}
function fbAllItems(){const r=[];for(const k in fbData.scannedBoxes){const b=fbData.scannedBoxes[k];if(b.items)b.items.forEach(i=>r.push(i))}return r}

/* ═══════════ CARTS ═══════════ */
const CARTS=[
  {id:'L',name:'L-kärry',color:'#ef4444',aisles:['L1','FA','L2','L3'],shelves:['L1','L2','L3','FA'],icon:'🔴'},
  {id:'A',name:'A-kärry',color:'#10b981',aisles:['A2','A3','A4','A5','A6_even','A6odd_A1even','A1odd_A7'],shelves:['A1+A6','A2','A3','A4','A5'],icon:'🟢'},
  {id:'B',name:'B-kärry',color:'#3b82f6',aisles:['B1','B2','B3','B4','UU'],shelves:['B1','B2','B3','B4','UU'],icon:'🔵'},
];
function getCart(pa){for(const c of CARTS)if(c.aisles.includes(pa))return c.id;return null}

/* ═══════════ ROUTE ═══════════ */
const PR=[{id:"L1",asc:1},{id:"FA",asc:1},{id:"L2",asc:0},{id:"L3",asc:1},{id:"L4",asc:0},{id:"L5",asc:1},{id:"A2",asc:0},{id:"A3",asc:1},{id:"A4",asc:0},{id:"A5",asc:1},{id:"A6_even",asc:0},{id:"A6odd_A1even",asc:1},{id:"A1odd_A7",asc:0},{id:"B1",asc:1},{id:"B2",asc:0},{id:"B3",asc:1},{id:"B4",asc:0},{id:"UU",asc:1},{id:"RX",asc:1},{id:"JK",asc:1}];
const PO=PR.map(p=>p.id),PD=Object.fromEntries(PR.map(p=>[p.id,p.asc]));
function pI(pa){const i=PO.indexOf(pa);return i===-1?999:i}
function sSort(items){return[...items].sort((a,b)=>{if(!a.parsedLoc&&!b.parsedLoc)return 0;if(!a.parsedLoc)return 1;if(!b.parsedLoc)return-1;const pa=pI(a.physAisle),pb=pI(b.physAisle);if(pa!==pb)return pa-pb;const asc=PD[a.physAisle]!==0;const sc=a.parsedLoc.shelf.localeCompare(b.parsedLoc.shelf,undefined,{numeric:1});if(sc)return asc?sc:-sc;const lc=a.parsedLoc.level.localeCompare(b.parsedLoc.level);if(lc)return asc?lc:-lc;const pc=a.parsedLoc.pos.localeCompare(b.parsedLoc.pos,undefined,{numeric:1});return asc?pc:-pc})}

/* ═══════════ LOCATION ═══════════ */
function pLoc(l){if(!l||typeof l!=='string')return null;const t=l.trim(),lt=t.toLowerCase();if(!lt||["uusi","null","vanha","0","uusi "].includes(lt))return null;const p=t.split("-");if(p.length===4){if(p[0].toUpperCase()==='UU'&&parseInt(p[1],10)>=4)return null;return{aisle:p[0],shelf:p[1],level:p[2],pos:p[3],raw:t,type:'shelf'}}if(/^[A-Za-z]\d{1,2}$/.test(t))return{aisle:'RX',shelf:t,level:'0',pos:'0',raw:t,type:'rx'};if(p.length===3)return{aisle:p[0],shelf:p[1],level:p[2],pos:'0',raw:t,type:'shelf3'};if(/^JK\d+$/i.test(t))return{aisle:'JK',shelf:t,level:'0',pos:'0',raw:t,type:'cold'};return null}
function sOdd(s){const n=parseInt(s,10);return isNaN(n)?null:n%2!==0}
function gPA(p){if(p.type==='rx')return'RX';if(p.type==='cold')return'JK';const{aisle:a,shelf:s}=p,o=sOdd(s);if(a==="A6")return o?"A6odd_A1even":"A6_even";if(a==="A1")return o===false?"A6odd_A1even":"A1odd_A7";if(a==="A7")return"A1odd_A7";return a}

/* ═══════════ PARSERS ═══════════ */
function pXML(t){const d=new DOMParser().parseFromString(t,"text/xml"),b={};const invoice=(d.querySelector("InvoiceNumber")||{}).textContent||Math.random().toString(36).slice(2,8);d.querySelectorAll("InvoiceRow").forEach(r=>{let boxId=null;const agi=r.querySelector("ArticleGroupIdentifier"),pkn=r.querySelector("PackageNumber"),bln=r.querySelector("BoxlistNumber");if(agi&&agi.textContent&&agi.textContent!=='?')boxId=agi.textContent;else if(pkn&&pkn.textContent)boxId=pkn.textContent;else if(bln&&bln.textContent)boxId=bln.textContent;else boxId='inv_'+invoice;const aid=r.querySelector("ArticleIdentifier")?.textContent||"";const vnrId=r.querySelector("VnrIdentifier")?.textContent||"";const n=r.querySelector("ArticleName")?.textContent||"";const q=parseInt((r.querySelector("DeliveredQuantity")?.textContent||"0").replace(',','.'),10)||0;if(!aid&&!vnrId)return;if(!b[boxId])b[boxId]=[];const e=b[boxId].find(i=>i.vnr===aid);if(e)e.qty+=q;else b[boxId].push({vnr:aid,altVnr:vnrId,name:n,qty:q})});const altKeys={};d.querySelectorAll("InvoiceRow").forEach(r=>{let boxId=null;const agi=r.querySelector("ArticleGroupIdentifier"),pkn=r.querySelector("PackageNumber"),bln=r.querySelector("BoxlistNumber");if(agi&&agi.textContent&&agi.textContent!=='?')boxId=agi.textContent;else if(pkn&&pkn.textContent)boxId=pkn.textContent;else if(bln&&bln.textContent)boxId=bln.textContent;else boxId='inv_'+invoice;const orig=r.querySelector("OriginalInvoiceNumber")?.textContent;const pick=r.querySelector("PicklistNumber")?.textContent;if(orig)altKeys[orig]=boxId;if(pick)altKeys[pick]=boxId});altKeys[invoice]='inv_'+invoice;b._altKeys=altKeys;return b}
function pCSV(t){if(t.charCodeAt(0)===0xFEFF)t=t.slice(1);const r=Papa.parse(t,{header:!0,skipEmptyLines:!0}),m={};const cols=r.meta?.fields||[];const skuCol=cols.find(c=>c.replace(/^\uFEFF/,'').toLowerCase()==='sku')||'sku';const nameCol=cols.find(c=>c.toLowerCase()==='name')||'name';const eanCol=cols.find(c=>c.toLowerCase()==='ean')||'ean';const locCol=cols.find(c=>c.toLowerCase().includes('storage_location')||c.toLowerCase().includes('location'))||'storage_location';r.data.forEach(row=>{const s=String(row[skuCol]||'').trim();if(!s)return;m[s]={name:String(row[nameCol]||'').trim(),ean:String(row[eanCol]||'').trim(),location:String(row[locCol]||'').trim()}});return m}

/* ═══════════ STATE ═══════════ */
let S={phase:'setup',xmlBoxes:null,boxAltKeys:null,masterData:null,error:null,lastScanResult:null,loadProgress:null,loadInfo:null,selectedCart:null,routeItems:[],unmatchedItems:[],rxItems:[],shelved:{},currentIdx:0,confirmedLoc:null,activeBox:null};
function setState(u){Object.assign(S,u);render()}
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function bCls(a){const k=a?.[0]||'U';return'badge badge-'+({'L':'L','F':'F','A':'A','B':'B','U':'U','R':'R','J':'J'}[k]||'U')}

function lookupMaster(vnr,alt){return S.masterData[vnr]||S.masterData[vnr.replace(/^0+/,'')]||(alt?(S.masterData[alt]||S.masterData[alt.replace(/^0+/,'')]):null)||{}}
function enrichItem(item){const vnr=String(item.vnr||''),alt=String(item.altVnr||'');const m=lookupMaster(vnr,alt),locStr=(m.location||'').trim();const pl=pLoc(locStr),pa=pl?gPA(pl):null,cid=pa?getCart(pa):null;return{vnr,altVnr:alt,name:item.name||m.name||'?',ean:m.ean||'',qty:item.qty,location:pl?locStr:null,parsedLoc:pl,physAisle:pa,cartId:cid}}
function getAllEnriched(){const items=fbAllItems(),all=[];items.forEach(item=>{const e=enrichItem(item);const ex=all.find(i=>i.vnr===e.vnr);if(ex)ex.qty+=e.qty;else all.push(e)});return all}
function tShelved(){return S.routeItems.reduce((s,i)=>s+Math.min(S.shelved[i.vnr]||0,i.qty),0)}
function tQty(){return S.routeItems.reduce((s,i)=>s+i.qty,0)}

/* ═══════════ GITHUB ═══════════ */
const RAW='https://raw.githubusercontent.com/oloapteekki-crypto/hyllytysappiuusi/main/';
const API='https://api.github.com/repos/oloapteekki-crypto/hyllytysappiuusi/contents/data/xml';

async function loadFromGitHub(){
  setState({error:null,loadProgress:'Haetaan tuoterekisteriä...'});
  try{
    const csv=await(await fetch(RAW+'data/tuoterekisteri.csv',{cache:'no-store'})).text();
    const master=pCSV(csv);
    setState({loadProgress:'Haetaan XML-listaa...'});
    const dir=await(await fetch(API,{cache:'no-store'})).json();
    const xf=dir.filter(f=>f.name.toLowerCase().endsWith('.xml'));
    if(!xf.length)throw new Error('Ei XML-tiedostoja');
    const allB={},allAlt={};
    for(let i=0;i<xf.length;i++){
      setState({loadProgress:`XML ${i+1}/${xf.length}...`});
      const boxes=pXML(await(await fetch(xf[i].download_url,{cache:'no-store'})).text());
      if(boxes._altKeys){Object.assign(allAlt,boxes._altKeys);delete boxes._altKeys}
      for(const[k,v]of Object.entries(boxes)){if(!allB[k])allB[k]=[];v.forEach(item=>{const e=allB[k].find(x=>x.vnr===item.vnr);if(e)e.qty+=item.qty;else allB[k].push({...item})})}
    }
    initFirebase();
    setState({xmlBoxes:allB,boxAltKeys:allAlt,masterData:master,phase:'scan',loadProgress:null,loadInfo:`${xf.length} XML, ${Object.keys(allB).length} laatikkoa`});
  }catch(e){setState({error:e.message,loadProgress:null})}
}

/* ═══════════ ACTIONS ═══════════ */
function addBox(code){
  if(!code)return;setState({error:null,lastScanResult:null});
  let sscc=S.xmlBoxes[code]?code:Object.keys(S.xmlBoxes).find(k=>k.endsWith(code)||code.endsWith(k));
  if(!sscc&&S.boxAltKeys){const m=S.boxAltKeys[code];if(m&&S.xmlBoxes[m])sscc=m}
  if(!sscc&&code.length>=18&&/^\d+$/.test(code)){const un=Object.keys(S.xmlBoxes).filter(k=>!fbIsBoxScanned(k));if(un.length===1)sscc=un[0]}
  if(!sscc){setState({error:'Koodi ei löydy',lastScanResult:{type:'fail',text:'Ei löydy'}});return}
  if(fbIsBoxScanned(sscc)){setState({error:'Jo skannattu',lastScanResult:{type:'fail',text:'Jo skannattu'}});return}
  const items=S.xmlBoxes[sscc].map(i=>{const e=enrichItem(i);return{vnr:e.vnr,altVnr:e.altVnr,name:e.name,ean:e.ean,qty:e.qty,location:e.location,cartId:e.cartId,physAisle:e.physAisle}});
  fbAddBox(sscc,items);
  setState({activeBox:{sscc,items},lastScanResult:{type:'ok',text:'✓ Laatikko ('+items.length+' tuotetta)'}});
}

function selectCart(id){
  const all=getAllEnriched();
  const ci=all.filter(i=>i.cartId===id);
  const rx=all.filter(i=>i.parsedLoc?.type==='rx');
  const um=all.filter(i=>!i.parsedLoc);
  fbTakeCart(id);
  setState({selectedCart:id,routeItems:sSort(ci),rxItems:rx,unmatchedItems:um,shelved:{},currentIdx:0,phase:'shelve',confirmedLoc:null,lastScanResult:null,error:null});
}

function confirmLocation(code){if(!code)return;setState({error:null,lastScanResult:null});const cur=S.routeItems[S.currentIdx];if(!cur)return;const sc=code.trim().toUpperCase(),ex=cur.location.trim().toUpperCase();if(sc===ex){setState({confirmedLoc:ex,lastScanResult:{type:'ok',text:'✓ '+cur.location}});return}const oi=S.routeItems.findIndex(i=>i.location&&i.location.trim().toUpperCase()===sc);if(oi!==-1){setState({confirmedLoc:sc,currentIdx:oi,lastScanResult:{type:'ok',text:'✓ '+S.routeItems[oi].location}});return}setState({error:'Paikka ei reitillä',lastScanResult:{type:'fail',text:'Väärä'}})}

function confirmEan(code){if(!code)return;setState({error:null,lastScanResult:null});if(!S.confirmedLoc){setState({error:'Skannaa paikka ensin'});return}const cur=S.routeItems[S.currentIdx];const m=(i,c)=>i.ean&&i.ean!=='null'&&(i.ean===c||c.endsWith(i.ean)||i.ean.endsWith(c));if(cur&&m(cur,code)){const p=S.shelved[cur.vnr]||0;S.shelved[cur.vnr]=p+1;setState({shelved:S.shelved,lastScanResult:{type:'ok',text:'✓ '+(p+1)+'/'+cur.qty}});return}const si=S.routeItems.findIndex(i=>i.location&&i.location.trim().toUpperCase()===S.confirmedLoc&&m(i,code));if(si!==-1){const o=S.routeItems[si],p=S.shelved[o.vnr]||0;if(p<o.qty){S.shelved[o.vnr]=p+1;setState({shelved:S.shelved,currentIdx:si,lastScanResult:{type:'ok',text:'✓ '+esc(o.name)+' '+(p+1)+'/'+o.qty}});return}setState({error:'Jo valmis'});return}setState({error:'EAN ei tunnistettu'})}

function adjustQty(v,d){S.shelved[v]=Math.max(0,(S.shelved[v]||0)+d);setState({shelved:S.shelved})}
function setQtyManual(v){const inp=document.getElementById('qty-manual-'+v);if(!inp)return;const n=parseInt(inp.value,10);if(!isNaN(n)&&n>=0){S.shelved[v]=n;setState({shelved:S.shelved})}}
function navTo(idx){if(idx<0||idx>=S.routeItems.length)return;const c=S.routeItems[S.currentIdx],n=S.routeItems[idx];const cl=c?.location?.trim().toUpperCase()||'',nl=n?.location?.trim().toUpperCase()||'';setState({currentIdx:idx,confirmedLoc:cl===nl&&S.confirmedLoc===cl?S.confirmedLoc:null,lastScanResult:null,error:null})}
function finishShelving(skip){if(!skip){const ts=tShelved(),tq=tQty();if(!confirm(ts<tq?`Kesken (${ts}/${tq}). Lopeta?`:'Lopeta?'))return}if(S.selectedCart)fbReleaseCart(S.selectedCart);setState({phase:'report'})}

function handleScan(cb){const inp=document.getElementById('scan-field');if(!inp)return;const v=inp.value;inp.value='';inp.focus();if(!v)return;if(cb==='addBox')addBox(v);else if(cb==='confirmLocation')confirmLocation(v);else if(cb==='confirmEan')confirmEan(v)}
function refocus(){const inp=document.getElementById('scan-field');if(inp&&document.activeElement!==inp)inp.focus()}
setInterval(refocus,2000);

/* ═══════════ RENDER ═══════════ */
function render(){
  const app=document.getElementById('app');

  if(S.phase==='setup'){
    app.innerHTML=`<div class="card"><h1>Hyllytysappi</h1><p class="sub">Lataa päivän tiedot</p>
      <button class="btn" onclick="loadFromGitHub()" ${S.loadProgress?'disabled':''}>${S.loadProgress||'Lataa tiedot palvelimelta'}</button>
      ${S.error?`<div class="error" style="margin-top:8px">${S.error}</div>`:''}</div>`;return}

  if(S.phase==='scan'){
    const total=Object.keys(S.xmlBoxes).length,sc=fbScannedCount();
    const all=getAllEnriched();
    const cc={};CARTS.forEach(c=>{cc[c.id]={items:0,qty:0}});
    let rxQ=0,newQ=0;
    all.forEach(i=>{if(i.parsedLoc?.type==='rx')rxQ+=i.qty;else if(!i.parsedLoc)newQ+=i.qty;else if(i.cartId&&cc[i.cartId]){cc[i.cartId].items++;cc[i.cartId].qty+=i.qty}});

    app.innerHTML=`
      <div class="card"><h1>Purku</h1>
        <p class="sub"><span class="live-dot"></span>${sc}/${total} laatikkoa luettu</p>
        <input type="text" id="scan-field" class="scan-input" placeholder="Skannaa laatikko" onkeydown="if(event.key==='Enter'){event.preventDefault();handleScan('addBox')}">
        ${S.lastScanResult?`<div class="scan-result ${S.lastScanResult.type==='ok'?'scan-ok':'scan-fail'}">${S.lastScanResult.text}</div>`:''}
        ${S.error?`<div class="error">${S.error}</div>`:''}</div>

      ${S.activeBox?(()=>{
        const items=S.activeBox.items;const byCart={};const rx=[];const uusi=[];
        items.forEach(i=>{const pl=i.parsedLoc||pLoc(i.location||'');
          if(pl&&pl.type==='rx')rx.push(i);
          else if(!i.location)uusi.push(i);
          else{const cid=i.cartId||'?';if(!byCart[cid])byCart[cid]=[];byCart[cid].push(i)}});
        let bx='<div class="card"><div class="flex justify-between items-center mb-8"><h2 style="margin:0">Laatikko ...'+S.activeBox.sscc.slice(-6)+'</h2>'+
          '<button class="btn-sm btn-outline" style="font-size:11px;padding:4px 10px" onclick="setState({activeBox:null})">✕ Sulje</button></div>';
        CARTS.forEach(c=>{if(!byCart[c.id]||!byCart[c.id].length)return;
          bx+='<div style="margin-bottom:10px;padding:10px 12px;border-radius:8px;border-left:4px solid '+c.color+';background:#fafbfc">'+
            '<div style="font-size:13px;font-weight:700;margin-bottom:6px">'+c.icon+' '+c.name+'</div>';
          byCart[c.id].forEach(i=>{bx+='<div style="padding:3px 0;font-size:12px"><div class="flex justify-between"><span>'+esc(i.name)+'</span>'+
            '<span style="font-weight:700;white-space:nowrap;margin-left:8px">'+i.qty+' kpl</span></div>'+
            '<div class="mono" style="color:#94a3b8">'+(i.location||'—')+(i.ean&&i.ean!=='null'?' | EAN '+i.ean:'')+'</div></div>'});
          bx+='</div>'});
        if(rx.length){bx+='<div style="margin-bottom:10px;padding:10px 12px;border-radius:8px;border-left:4px solid #b91c1c;background:#fef2f2">'+
          '<div style="font-size:13px;font-weight:700;color:#b91c1c;margin-bottom:6px">💊 Reseptilääkkeet</div>';
          rx.forEach(i=>{bx+='<div style="font-size:12px;color:#7f1d1d;padding:3px 0">'+esc(i.name)+' → '+i.location+' ('+i.qty+' kpl)</div>'});bx+='</div>'}
        if(uusi.length){bx+='<div style="padding:10px 12px;border-radius:8px;border-left:4px solid #f59e0b;background:#fffbeb">'+
          '<div style="font-size:13px;font-weight:700;color:#92400e;margin-bottom:6px">📦 UUSI-hyllyyn</div>';
          uusi.forEach(i=>{bx+='<div style="font-size:12px;color:#78350f;padding:3px 0">'+esc(i.name)+' ('+i.qty+' kpl)</div>'});bx+='</div>'}
        bx+='</div>';return bx;
      })():''}
      <div class="card"><h2>Kärryt</h2>
        ${CARTS.map(c=>`<div style="padding:10px 12px;border-radius:8px;margin-bottom:6px;border-left:4px solid ${c.color};background:#fafbfc">
          <div class="flex justify-between items-center"><div>${c.icon} <b>${c.name}</b></div><div style="font-size:14px;font-weight:700">${cc[c.id].qty} kpl</div></div>
          <div style="font-size:11px;color:#64748b;margin-top:2px">Levyt: ${c.shelves.join(', ')} — ${cc[c.id].items} tuotetta</div></div>`).join('')}
        ${rxQ?`<div style="padding:8px 12px;border-radius:8px;background:#fef2f2;font-size:13px;margin-bottom:6px">💊 Reseptilääkkeet: ${rxQ} kpl</div>`:''}
        ${newQ?`<div style="padding:8px 12px;border-radius:8px;background:#fffbeb;font-size:13px;margin-bottom:6px">📦 UUSI-hyllyyn: ${newQ} kpl</div>`:''}</div>
      <button class="btn" style="background:#16a34a" onclick="setState({phase:'cartSelect'})">Valitse kärry → Hyllytys</button>`;
    setTimeout(refocus,50);return}

  if(S.phase==='cartSelect'){
    const all=getAllEnriched();
    app.innerHTML=`<div class="card"><h1>Valitse kärry</h1><p class="sub">Ota kärry ja aloita hyllytys</p></div>
      ${CARTS.map(c=>{const items=all.filter(i=>i.cartId===c.id);const qty=items.reduce((s,i)=>s+i.qty,0);
        const tk=fbData.cartsTaken[c.id],mine=tk&&tk.by===sessionId,taken=tk&&!mine;
        return`<div class="cart-card ${taken?'taken':''}" style="border-color:${c.color}" onclick="${taken?'':`selectCart('${c.id}')`}">
          <div style="font-size:32px;margin-bottom:8px">${c.icon}</div>
          <div style="font-size:18px;font-weight:700">${c.name}</div>
          <div style="font-size:13px;color:#64748b;margin:4px 0">Levyt: ${c.shelves.join(', ')}</div>
          <div style="font-size:20px;font-weight:800;margin:8px 0">${qty} kpl</div>
          <div style="font-size:14px;font-weight:700">${items.length} tuotetta</div>
          ${taken?'<div style="margin-top:8px;font-size:12px;color:#dc2626;font-weight:600">⛔ Toinen hyllyttää</div>':''}</div>`}).join('')}
      <button class="btn-sm btn-outline" style="width:100%;margin-top:8px" onclick="setState({phase:'scan'})">← Takaisin</button>`;return}

  if(S.phase==='shelve'){
    const ts=tShelved(),tq=tQty(),pct=tq>0?Math.round(ts/tq*100):0;
    const cur=S.routeItems[S.currentIdx],cc=cur?(S.shelved[cur.vnr]||0):0,cd=cur?cc>=cur.qty:false;
    const cart=CARTS.find(c=>c.id===S.selectedCart);
    if(!cur){finishShelving(true);return}
    const lm=S.confirmedLoc&&cur.location&&cur.location.trim().toUpperCase()===S.confirmedLoc;
    const cb=lm?'confirmEan':'confirmLocation';

    app.innerHTML=`
      <div class="mb-12"><div class="flex justify-between items-center mb-6"><div>${cart?.icon||''} <b>${cart?.name||''}</b></div>
        <span style="font-size:12px;color:#94a3b8">${ts}/${tq} (${pct}%)</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div></div>

      ${S.unmatchedItems.length?`<div class="card" style="border-left:4px solid #f59e0b;background:#fffbeb">
        <div style="font-size:13px;font-weight:700;color:#92400e;margin-bottom:4px">📦 UUSI-hyllyyn (${S.unmatchedItems.length})</div>
        ${S.unmatchedItems.slice(0,5).map(i=>`<div style="font-size:12px;color:#78350f">${esc(i.name)} — ${i.qty} kpl</div>`).join('')}
        ${S.unmatchedItems.length>5?`<div style="font-size:11px;color:#92400e">...ja ${S.unmatchedItems.length-5} muuta</div>`:''}</div>`:''}
      ${S.rxItems.length?`<div class="card" style="border-left:4px solid #b91c1c;background:#fef2f2">
        <div style="font-size:13px;font-weight:700;color:#b91c1c;margin-bottom:4px">💊 Reseptilääkkeet (${S.rxItems.length})</div>
        ${S.rxItems.slice(0,5).map(i=>`<div style="font-size:12px;color:#7f1d1d">${esc(i.name)} → ${i.location} (${i.qty})</div>`).join('')}</div>`:''}

      <div class="card" style="border-left:4px solid ${cart?.color||'#64748b'}">
        <div style="font-size:12px;color:#94a3b8;margin-bottom:8px;text-align:right">${S.currentIdx+1}/${S.routeItems.length}</div>
        ${cur.parsedLoc?`<div class="flex items-center gap-8 mb-6"><span class="${bCls(cur.parsedLoc.aisle)}">${cur.parsedLoc.aisle}</span><span class="location-big">${cur.location}</span></div>`:''}
        <div style="font-size:15px;font-weight:600;margin-bottom:4px">${esc(cur.name)}</div>
        <div class="mono" style="color:#64748b;margin-bottom:10px">VNR ${cur.vnr}${cur.ean&&cur.ean!=='null'?' | EAN '+cur.ean:''}</div>
        <div class="qty-display" style="background:${cd?'#f0fdf4':'#f8fafc'};border:2px solid ${cd?'#86efac':'#e2e8f0'}">
          <span style="font-size:36px;font-weight:800;color:${cd?'#16a34a':'#1e293b'}">${cc}</span>
          <span style="font-size:22px;color:#94a3b8"> / </span>
          <span style="font-size:36px;font-weight:800;color:#64748b">${cur.qty}</span>${cd?'<span style="font-size:24px;margin-left:8px">✓</span>':''}</div>
        <div class="qty-adj">
          <button class="qty-btn" style="color:#dc2626;border-color:#fca5a5" onclick="adjustQty('${cur.vnr}',-1)">−</button>
          <input type="number" id="qty-manual-${cur.vnr}" class="qty-manual" value="${cc}" min="0" onchange="setQtyManual('${cur.vnr}')">
          <button class="qty-btn" style="color:#16a34a;border-color:#86efac" onclick="adjustQty('${cur.vnr}',1)">+</button></div></div>

      <div class="card">
        ${!lm?`<div style="font-size:13px;font-weight:600;color:#92400e;margin-bottom:8px">1. Skannaa paikka: <b>${cur.location}</b></div>`
        :`<div style="font-size:13px;font-weight:600;color:#16a34a;margin-bottom:8px">✓ ${cur.location} — 2. Skannaa EAN</div>`}
        <input type="text" id="scan-field" class="scan-input" placeholder="${lm?'Skannaa EAN':'Skannaa paikka'}" onkeydown="if(event.key==='Enter'){event.preventDefault();handleScan('${cb}')}">
        ${S.lastScanResult?`<div class="scan-result ${S.lastScanResult.type==='ok'?'scan-ok':'scan-fail'}">${S.lastScanResult.text}</div>`:''}
        ${S.error?`<div class="error">${S.error}</div>`:''}</div>

      <div class="flex gap-8 mb-12">
        <button class="btn-sm btn-outline flex-1" ${S.currentIdx===0?'disabled':''} onclick="navTo(S.currentIdx-1)">←</button>
        <button class="btn-sm btn-outline flex-1" ${S.currentIdx>=S.routeItems.length-1?'disabled':''} onclick="navTo(S.currentIdx+1)">→</button></div>
      <button class="btn" style="background:#16a34a;margin-bottom:12px" onclick="finishShelving()">Lopeta → Raportti</button>`;
    setTimeout(refocus,50);return}

  if(S.phase==='report'){
    const ok=[],under=[],over=[],notDone=[];
    S.routeItems.forEach(i=>{const s=S.shelved[i.vnr]||0;if(s===i.qty)ok.push({...i,sq:s});else if(s>i.qty)over.push({...i,sq:s});else if(s>0)under.push({...i,sq:s});else notDone.push({...i,sq:0})});
    const ts=tShelved(),tq=tQty(),cart=CARTS.find(c=>c.id===S.selectedCart);
    app.innerHTML=`
      <div class="card"><h1>${cart?.icon||''} ${cart?.name||''} — Raportti</h1>
        <div class="flex gap-8" style="margin:12px 0">
          <div style="flex:1;padding:10px;border-radius:8px;background:#f0fdf4;text-align:center"><div style="font-size:22px;font-weight:700;color:#16a34a">${ts}</div><div style="font-size:11px;color:#047857">Hyllytetty</div></div>
          <div style="flex:1;padding:10px;border-radius:8px;background:#f8fafc;text-align:center"><div style="font-size:22px;font-weight:700">${tq}</div><div style="font-size:11px;color:#64748b">Odotettu</div></div>
          <div style="flex:1;padding:10px;border-radius:8px;background:${ts===tq?'#f0fdf4':'#fef2f2'};text-align:center"><div style="font-size:22px;font-weight:700;color:${ts===tq?'#16a34a':'#dc2626'}">${ts-tq}</div><div style="font-size:11px;color:#64748b">Erotus</div></div></div></div>
      ${under.length?`<div class="card"><h2 style="color:#92400e">Vajaita (${under.length})</h2>${under.map(i=>`<div class="report-row report-warn"><div style="font-weight:600;font-size:12px">${esc(i.name)}</div><div style="font-weight:700;color:#92400e">${i.sq}/${i.qty}</div></div>`).join('')}</div>`:''}
      ${notDone.length?`<div class="card"><h2 style="color:#dc2626">Ei hyllytetty (${notDone.length})</h2>${notDone.map(i=>`<div class="report-row report-err"><div style="font-weight:600;font-size:12px">${esc(i.name)}</div><div style="font-weight:700;color:#dc2626">0/${i.qty}</div></div>`).join('')}</div>`:''}
      ${over.length?`<div class="card"><h2 style="color:#7c3aed">Ylimäärä (${over.length})</h2>${over.map(i=>`<div class="report-row" style="background:#f5f3ff;border:1px solid #ddd6fe"><div style="font-weight:600;font-size:12px">${esc(i.name)}</div><div style="font-weight:700;color:#7c3aed">${i.sq}/${i.qty}</div></div>`).join('')}</div>`:''}
      ${ok.length?`<details class="card"><summary style="color:#16a34a">OK (${ok.length})</summary>${ok.map(i=>`<div class="report-row report-ok"><div style="font-weight:600;font-size:12px">${esc(i.name)}</div><div style="font-weight:700;color:#16a34a">${i.qty} ✓</div></div>`).join('')}</details>`:''}
      <div class="flex gap-8"><button class="btn-sm btn-outline flex-1" onclick="setState({phase:'cartSelect',selectedCart:null,routeItems:[],shelved:{},currentIdx:0})">Toinen kärry</button>
        <button class="btn flex-1" style="padding:10px" onclick="setState({phase:'scan',selectedCart:null,routeItems:[],shelved:{},currentIdx:0})">Purkuun</button></div>`;
  }
}
render();
</script>
</body>
</html>
