<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#f8fafc;color:#1e293b;-webkit-tap-highlight-color:transparent}
.app{max-width:480px;margin:0 auto;padding:16px 12px;min-height:100dvh}
.card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:16px;margin-bottom:12px}
h1{font-size:20px;font-weight:700;margin-bottom:4px}
h2{font-size:16px;font-weight:700;margin-bottom:8px}
.sub{font-size:12px;color:#64748b;margin-bottom:16px}
.btn{width:100%;padding:14px 0;border-radius:10px;border:none;background:#1e293b;color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn:disabled{background:#e2e8f0;color:#94a3b8;cursor:not-allowed}
.btn:active:not(:disabled){opacity:.8}
.btn-sm{padding:10px 20px;border-radius:8px;border:none;font-size:14px;font-weight:600;cursor:pointer}

.scan-input{width:100%;padding:14px 12px;border-radius:10px;border:2px solid #e2e8f0;font-size:18px;font-family:monospace;font-weight:600;text-align:center;outline:none}
.scan-input:focus{border-color:#3b82f6}
.label{display:block;font-size:12px;font-weight:600;color:#475569;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.mono{font-family:'JetBrains Mono','SF Mono','Courier New',monospace;font-size:12px}
.error{color:#dc2626;font-size:13px;text-align:center;margin-top:6px}
.flex{display:flex}.gap-8{gap:8px}.gap-6{gap:6px}.items-center{align-items:center}.justify-between{justify-content:space-between}.flex-1{flex:1}
.mb-6{margin-bottom:6px}.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}.text-center{text-align:center}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;font-family:monospace}
.badge-L{background:#e0f2fe;color:#0369a1;border:1.5px solid #7dd3fc}
.badge-F{background:#fce7f3;color:#be185d;border:1.5px solid #f9a8d4}
.badge-A{background:#ecfdf5;color:#047857;border:1.5px solid #6ee7b7}
.badge-B{background:#fef3c7;color:#92400e;border:1.5px solid #fcd34d}
.badge-U{background:#f3e8ff;color:#7c3aed;border:1.5px solid #c4b5fd}
.badge-R{background:#fee2e2;color:#b91c1c;border:1.5px solid #fca5a5}
.badge-J{background:#e0f2fe;color:#0369a1;border:1.5px solid #7dd3fc}
.cart-badge{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;font-size:13px;font-weight:800;color:#fff;flex-shrink:0}
.cart-1{background:#ef4444}.cart-2{background:#f59e0b}.cart-3{background:#10b981}.cart-4{background:#3b82f6}.cart-5{background:#8b5cf6}
.progress-bar{height:8px;border-radius:4px;background:#e2e8f0;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;background:#1e293b;transition:width .3s}
.progress-fill.done{background:#16a34a}
.route-item{padding:8px 10px;border-radius:8px;margin-bottom:4px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border:1px solid #f1f5f9}
.route-item.current{background:#eff6ff;border:2px solid #3b82f6}
.route-item.completed{opacity:.5}
.route-item-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.route-item-loc{font-size:11px;color:#64748b;font-family:monospace}
.qty-display{display:flex;align-items:center;justify-content:center;gap:4px;padding:14px;border-radius:10px;font-family:monospace}
.qty-count{font-size:36px;font-weight:800}.qty-sep{font-size:22px;color:#94a3b8}.qty-total{font-size:36px;font-weight:800;color:#64748b}
.scanned-box{padding:8px 12px;border-radius:8px;margin-bottom:6px;background:#f8fafc;border:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center}
.location-big{font-size:20px;font-weight:700;font-family:monospace;color:#1e293b}
.or-divider{display:flex;align-items:center;gap:12px;margin:12px 0;color:#94a3b8;font-size:12px}
.or-divider::before,.or-divider::after{content:'';flex:1;height:1px;background:#e2e8f0}
.tab-bar{display:flex;gap:4px;margin-bottom:8px}
.tab{flex:1;padding:8px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;text-align:center}
.tab.active{background:#1e293b;color:#fff}.tab:not(.active){background:#e2e8f0;color:#475569}
.camera-wrap{position:relative;width:100%;border-radius:10px;overflow:hidden;margin-bottom:8px;background:#000;aspect-ratio:4/3}
.camera-wrap video{width:100%;height:100%;object-fit:cover;display:block}
.camera-guide{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:75%;height:25%;border:2px solid rgba(255,255,255,.7);border-radius:8px;pointer-events:none}
.camera-flash{position:absolute;inset:0;background:rgba(76,175,80,.3);pointer-events:none;opacity:0;transition:opacity .15s}
.camera-flash.show{opacity:1}
.scan-result{padding:10px;border-radius:8px;margin-top:8px;font-size:13px;text-align:center;font-weight:600}
.scan-ok{background:#f0fdf4;color:#16a34a;border:1px solid #86efac}
.scan-fail{background:#fef2f2;color:#dc2626;border:1px solid #fca5a5}
details summary{cursor:pointer;font-size:14px;font-weight:600;margin-bottom:8px}
details[open] summary{margin-bottom:12px}
.hidden{display:none!important}
#scanner-input{position:fixed;top:0;left:0;width:100%;height:1px;opacity:0.01;border:none;padding:0;font-size:16px;z-index:-1}
.scanner-status{padding:16px;border-radius:10px;text-align:center;font-size:15px;font-weight:600;cursor:pointer;user-select:none;-webkit-user-select:none}
.qty-adj{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:8px}
.qty-btn{width:44px;height:44px;border-radius:10px;border:2px solid #e2e8f0;background:#fff;font-size:22px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#1e293b;transition:all .1s}
.qty-btn:active{background:#f1f5f9;transform:scale(.95)}
.qty-btn.minus{color:#dc2626;border-color:#fca5a5}
.qty-btn.plus{color:#16a34a;border-color:#86efac}
.qty-manual{width:60px;text-align:center;font-size:18px;font-weight:700;font-family:monospace;border:2px solid #e2e8f0;border-radius:8px;padding:8px 4px;outline:none}
.qty-manual:focus{border-color:#3b82f6}
.report-row{padding:8px 10px;border-radius:8px;margin-bottom:4px;font-size:13px;display:flex;justify-content:space-between;align-items:center}
.report-ok{background:#f0fdf4;border:1px solid #dcfce7}
.report-warn{background:#fffbeb;border:1px solid #fde68a}
.report-err{background:#fef2f2;border:1px solid #fecaca}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
/* ═══════════ ROUTE CONFIG ═══════════ */
const PR=[
  {id:"L1",asc:!0},{id:"FA",asc:!0},{id:"L2",asc:!1},{id:"L3",asc:!0},
  {id:"L4",asc:!1},{id:"L5",asc:!0},{id:"A2",asc:!1},{id:"A3",asc:!0},
  {id:"A4",asc:!1},{id:"A5",asc:!0},{id:"A6_even",asc:!1},{id:"A6odd_A1even",asc:!0},
  {id:"A1odd_A7",asc:!1},{id:"B1",asc:!0},{id:"B2",asc:!1},{id:"B3",asc:!0},
  {id:"B4",asc:!1},{id:"UU",asc:!0},{id:"RX",asc:!0},{id:"JK",asc:!0},
];
const PO=PR.map(p=>p.id),PD=Object.fromEntries(PR.map(p=>[p.id,p.asc]));
const PL={L1:"L1",FA:"FA",L2:"L2",L3:"L3",L4:"L4",L5:"L5",A2:"A2",A3:"A3",A4:"A4",A5:"A5",A6_even:"A6 par.",A6odd_A1even:"A6/A1",A1odd_A7:"A1/A7",B1:"B1",B2:"B2",B3:"B3",B4:"B4",UU:"UU",RX:"Reseptilääke",JK:"Jääkaappi"};
const CZ=[
  {pos:1,aisles:["L1","FA","L2","L3"],color:"#ef4444"},
  {pos:2,aisles:["L4","L5","A2","A3"],color:"#f59e0b"},
  {pos:3,aisles:["A4","A5","A6_even","A6odd_A1even"],color:"#10b981"},
  {pos:4,aisles:["A1odd_A7","B1","B2"],color:"#3b82f6"},
  {pos:5,aisles:["B3","B4","UU","RX","JK"],color:"#8b5cf6"},
];
function cartPos(pa){for(const z of CZ)if(z.aisles.includes(pa))return z.pos;return 5}

/* ═══════════ LOCATION ═══════════ */
function pLoc(l){
  if(!l||typeof l!=='string')return null;
  const t=l.trim(),lt=t.toLowerCase();
  if(!lt||["uusi","null","vanha","0","uusi "].includes(lt))return null;
  const p=t.split("-");
  if(p.length===4){
    // UU-04 tai korkeampi → ei enää olemassa, ohjataan UUSI-hyllyyn
    if(p[0].toUpperCase()==='UU'&&parseInt(p[1],10)>=4)return null;
    return{aisle:p[0],shelf:p[1],level:p[2],pos:p[3],raw:t,type:'shelf'};
  }
  if(/^[A-Za-z]\d{1,2}$/.test(t))return{aisle:'RX',shelf:t,level:'0',pos:'0',raw:t,type:'rx'};
  if(p.length===3)return{aisle:p[0],shelf:p[1],level:p[2],pos:'0',raw:t,type:'shelf3'};
  if(/^JK\d+$/i.test(t))return{aisle:'JK',shelf:t,level:'0',pos:'0',raw:t,type:'cold'};
  return null;
}
function sOdd(s){const n=parseInt(s,10);return isNaN(n)?null:n%2!==0}
function gPA(p){
  if(p.type==='rx')return'RX';if(p.type==='cold')return'JK';
  const{aisle:a,shelf:s}=p,o=sOdd(s);
  if(a==="A6")return o?"A6odd_A1even":"A6_even";
  if(a==="A1")return o===!1?"A6odd_A1even":"A1odd_A7";
  if(a==="A7")return"A1odd_A7";return a;
}
function pI(pa){const i=PO.indexOf(pa);return i===-1?999:i}
function sSort(items){return[...items].sort((a,b)=>{if(!a.parsedLoc&&!b.parsedLoc)return 0;if(!a.parsedLoc)return 1;if(!b.parsedLoc)return-1;const pa=pI(a.physAisle),pb=pI(b.physAisle);if(pa!==pb)return pa-pb;const asc=PD[a.physAisle]!==!1;const sc=a.parsedLoc.shelf.localeCompare(b.parsedLoc.shelf,undefined,{numeric:!0});if(sc)return asc?sc:-sc;const lc=a.parsedLoc.level.localeCompare(b.parsedLoc.level);if(lc)return asc?lc:-lc;const pc=a.parsedLoc.pos.localeCompare(b.parsedLoc.pos,undefined,{numeric:!0});return asc?pc:-pc})}

/* ═══════════ FILE PARSERS ═══════════ */
function rF(f,e='utf-8'){return new Promise((r,j)=>{const x=new FileReader();x.onload=v=>r(v.target.result);x.onerror=j;x.readAsText(f,e)})}
function pXML(t){
  const d=new DOMParser().parseFromString(t,"text/xml"),b={};
  const invoice=(d.querySelector("InvoiceNumber")||{}).textContent||Math.random().toString(36).slice(2,8);
  d.querySelectorAll("InvoiceRow").forEach(r=>{
    let boxId=null;
    const agi=r.querySelector("ArticleGroupIdentifier"),pkn=r.querySelector("PackageNumber"),bln=r.querySelector("BoxlistNumber");
    if(agi&&agi.textContent&&agi.textContent!=='?')boxId=agi.textContent;
    else if(pkn&&pkn.textContent)boxId=pkn.textContent;
    else if(bln&&bln.textContent)boxId=bln.textContent;
    else boxId='inv_'+invoice;
    const aid=r.querySelector("ArticleIdentifier")?.textContent||"";
    const vnrId=r.querySelector("VnrIdentifier")?.textContent||"";
    const n=r.querySelector("ArticleName")?.textContent||"";
    const qRaw=r.querySelector("DeliveredQuantity")?.textContent||"0";
    const q=parseInt(qRaw.replace(',','.'),10)||Math.round(parseFloat(qRaw.replace(',','.'))||0);
    if(!aid&&!vnrId)return;
    const vnr=aid;
    if(!b[boxId])b[boxId]=[];
    const e=b[boxId].find(i=>i.vnr===vnr);
    if(e)e.qty+=q;else b[boxId].push({vnr,altVnr:vnrId,name:n,qty:q});
  });
  // Add alternative keys for box lookup (OriginalInvoiceNumber, PicklistNumber, InvoiceNumber)
  // So scanning any of these codes will find the box
  const altKeys={};
  d.querySelectorAll("InvoiceRow").forEach(r=>{
    let boxId=null;
    const agi=r.querySelector("ArticleGroupIdentifier"),pkn=r.querySelector("PackageNumber"),bln=r.querySelector("BoxlistNumber");
    if(agi&&agi.textContent&&agi.textContent!=='?')boxId=agi.textContent;
    else if(pkn&&pkn.textContent)boxId=pkn.textContent;
    else if(bln&&bln.textContent)boxId=bln.textContent;
    else boxId='inv_'+invoice;
    // Map alternative codes to this boxId
    const orig=r.querySelector("OriginalInvoiceNumber")?.textContent;
    const pick=r.querySelector("PicklistNumber")?.textContent;
    if(orig)altKeys[orig]=boxId;
    if(pick)altKeys[pick]=boxId;
  });
  // Also map invoice number itself
  altKeys[invoice]='inv_'+invoice;
  altKeys['inv_'+invoice]='inv_'+invoice;
  b._altKeys=altKeys;
  return b;
}
function pCSV(t){
  if(t.charCodeAt(0)===0xFEFF)t=t.slice(1);
  const r=Papa.parse(t,{header:!0,skipEmptyLines:!0}),m={};
  const cols=r.meta?.fields||[];
  const skuCol=cols.find(c=>c.replace(/^\uFEFF/,'').toLowerCase()==='sku')||'sku';
  const nameCol=cols.find(c=>c.toLowerCase()==='name')||'name';
  const eanCol=cols.find(c=>c.toLowerCase()==='ean')||'ean';
  const locCol=cols.find(c=>c.toLowerCase().includes('storage_location')||c.toLowerCase().includes('location'))||'storage_location';
  r.data.forEach(row=>{const s=String(row[skuCol]||'').trim();if(!s)return;
    m[s]={name:String(row[nameCol]||'').trim(),ean:String(row[eanCol]||'').trim(),location:String(row[locCol]||'').trim()};
  });return m;
}

/* ═══════════ CAMERA ═══════════ */
let camStream=null,camRunning=!1,camDetector=null,camLast="",camLastT=0,camCallback=null;
async function camStart(cb){
  camStop();camCallback=cb;const v=document.getElementById('cam-video');if(!v)return;
  if(!('BarcodeDetector'in window)){setState({error:'BarcodeDetector API ei tuettu'});return}
  try{camDetector=new BarcodeDetector({formats:['ean_13','ean_8','code_128','code_39','itf','upc_a','upc_e']});
    camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}});
    v.srcObject=camStream;await v.play();camRunning=!0;camScan()
  }catch(e){setState({error:e.name==='NotAllowedError'?'Kamera estetty — tarkista asetukset':'Kamera-virhe: '+e.message})}
}
function camScan(){if(!camRunning)return;const v=document.getElementById('cam-video');if(!v){camRunning=!1;return}
  camDetector.detect(v).then(codes=>{if(codes.length>0){const c=codes[0].rawValue,now=Date.now();
    if(c!==camLast||now-camLastT>2000){camLast=c;camLastT=now;if(navigator.vibrate)navigator.vibrate(100);
      const fl=document.getElementById('cam-flash');if(fl){fl.classList.add('show');setTimeout(()=>fl.classList.remove('show'),200)}
      if(camCallback)camCallback(c)}}}).catch(()=>{});if(camRunning)requestAnimationFrame(camScan)}
function camStop(){camRunning=!1;if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null}camLast="";camLastT=0}

/* ═══════════ STATE ═══════════ */
let S={
  phase:'setup',xmlBoxes:null,boxAltKeys:null,masterData:null,
  scannedBoxes:[],routeItems:[],unmatchedItems:[],rxItems:[],shelved:{},
  currentIdx:0,error:null,scanMode:'scanner',
  lastScanResult:null,loadInfo:null,loadProgress:null,confirmedLoc:null,activeBox:null,pendingSSCC:null,
};

// ── Session storage: survive page refresh ──
const STORAGE_KEY='hyllytysappi_state';
function saveState(){
  try{
    // Save everything except raw file data (too large) and transient UI state
    const toSave={
      phase:S.phase,scannedBoxes:S.scannedBoxes,routeItems:S.routeItems,
      unmatchedItems:S.unmatchedItems,rxItems:S.rxItems,shelved:S.shelved,
      currentIdx:S.currentIdx,loadInfo:S.loadInfo,confirmedLoc:S.confirmedLoc,
      xmlBoxes:S.phase==='scan'?S.xmlBoxes:null,
      boxAltKeys:S.phase==='scan'?S.boxAltKeys:null,
      masterData:S.phase==='scan'?S.masterData:null,
    };
    sessionStorage.setItem(STORAGE_KEY,JSON.stringify(toSave));
  }catch(e){console.warn('State save failed',e)}
}
function loadSavedState(){
  try{
    const raw=sessionStorage.getItem(STORAGE_KEY);
    if(!raw)return false;
    const saved=JSON.parse(raw);
    // Only restore if we were past setup
    if(!saved.phase||saved.phase==='setup')return false;
    if(saved.phase==='scan'&&(!saved.xmlBoxes||!saved.masterData))return false;
    // Restore
    Object.assign(S,saved);
    S.error=null;S.lastScanResult=null;S.scanMode='scanner';S.activeBox=null;
    return true;
  }catch(e){return false}
}
function clearSavedState(){try{sessionStorage.removeItem(STORAGE_KEY)}catch(e){}}

// ── Undo: track last shelved actions ──
let undoStack=[];
function pushUndo(action){undoStack.push(action);if(undoStack.length>50)undoStack.shift()}
function popUndo(){
  if(!undoStack.length)return;
  const action=undoStack.pop();
  if(action.type==='shelve'){
    S.shelved[action.vnr]=action.prevQty;
    setState({shelved:S.shelved,currentIdx:action.idx,lastScanResult:{type:'ok',text:'↩ Peruttu: '+esc(action.name)}});
  }
}

// Fullscreen on first tap (mobile)
let fsTriggered=false;
function goFullscreen(){
  if(fsTriggered)return;
  const el=document.documentElement;
  if(el.requestFullscreen)el.requestFullscreen().catch(()=>{});
  else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();
  fsTriggered=true;
}
document.addEventListener('click',function(){if(!fsTriggered&&S.phase!=='setup')goFullscreen()},{once:false});

// Prevent page refresh
window.addEventListener('beforeunload',function(e){
  if(S.phase!=='setup'){saveState();e.preventDefault();e.returnValue='Hyllytyserä on kesken.'}
});

// Auto-refocus scanner input when user taps elsewhere or after dialogs
function refocusScanner(){
  if(S.scanMode==='scanner'&&S.phase!=='setup'&&S.phase!=='report'){
    const inp=document.getElementById('scanner-input');
    if(inp&&document.activeElement!==inp){
      // Set readonly first to prevent keyboard, then focus, then remove readonly
      inp.setAttribute('readonly','readonly');
      inp.focus();
      setTimeout(()=>inp.removeAttribute('readonly'),100);
    }
  }
}
document.addEventListener('click',function(e){
  const tag=e.target.tagName;
  if(['BUTTON','SELECT','TEXTAREA','A','SUMMARY'].includes(tag))return;
  // If clicking scanner-status or anywhere non-interactive, refocus
  setTimeout(refocusScanner,200);
});
setInterval(refocusScanner,1500);

function setState(u){
  Object.assign(S,u);
  // Save after meaningful state changes
  if(S.phase!=='setup')saveState();
  render();
}

// Try to restore on load
const wasRestored=loadSavedState();

/* ═══════════ HELPERS ═══════════ */
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function bCls(a){const k=a?.[0]||'U';return'badge badge-'+({'L':'L','F':'F','A':'A','B':'B','U':'U','R':'R','J':'J'}[k]||'U')}
function cBadge(p){return`<span class="cart-badge cart-${p}">${p}</span>`}
function tShelved(){return S.routeItems.reduce((s,i)=>s+Math.min(S.shelved[i.vnr]||0,i.qty),0)}
function tQty(){return S.routeItems.reduce((s,i)=>s+i.qty,0)}

function lookupMaster(vnr,altVnr){
  return S.masterData[vnr]||S.masterData[vnr.replace(/^0+/,'')]||(altVnr?(S.masterData[altVnr]||S.masterData[altVnr.replace(/^0+/,'')]):null)||{};
}

function enrichItems(boxes){
  const all=[];
  boxes.forEach(box=>{(box.items||[]).forEach(item=>{try{
    const vnr=String(item.vnr||''),alt=String(item.altVnr||'');
    const m=lookupMaster(vnr,alt),locStr=(m.location||'').trim();
    const pl=pLoc(locStr),pa=pl?gPA(pl):null,cp=pa?cartPos(pa):0;
    const ex=all.find(i=>i.vnr===vnr);
    if(ex)ex.qty+=item.qty;
    else all.push({vnr,altVnr:alt,name:item.name||m.name||'?',ean:m.ean||'',qty:item.qty,location:pl?locStr:null,parsedLoc:pl,physAisle:pa,cartPos:cp});
  }catch(e){console.error('enrichItems error',item.vnr,e)}})});return all;
}
function getCartPreview(){const a=enrichItems(S.scannedBoxes);return{withLoc:a.filter(i=>i.parsedLoc),noLoc:a.filter(i=>!i.parsedLoc)}}

function showBoxDetail(sscc){
  const box=S.scannedBoxes.find(b=>b.sscc===sscc);if(!box)return;
  const enriched=[];
  box.items.forEach(item=>{const vnr=String(item.vnr||''),alt=String(item.altVnr||'');

const REPO_OWNER='oloapteekki-crypto';
const REPO_NAME='hyllytysappiuusi';
const REPO_BRANCH='main';
const RAW_BASE=`https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${REPO_BRANCH}/`;
const API_BASE=`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/`;

async function loadFromGitHub(){
  setState({error:null,loadProgress:'Haetaan tuoterekisteriä...'});
  try{
    // 1. Fetch CSV
    const csvResp=await fetch(RAW_BASE+'data/tuoterekisteri.csv',{cache:'no-store'});
    if(!csvResp.ok)throw new Error('Tuoterekisteriä ei löydy (data/tuoterekisteri.csv)');
    const csvText=await csvResp.text();
    const master=pCSV(csvText);
    if(Object.keys(master).length<10)throw new Error('Tuoterekisteri näyttää tyhjältä ('+Object.keys(master).length+' tuotetta)');

    // 2. List XML files in data/xml/
    setState({loadProgress:'Haetaan toimitusilmoituksia...'});
    const dirResp=await fetch(API_BASE+'data/xml',{cache:'no-store'});
    if(!dirResp.ok)throw new Error('XML-kansiota ei löydy (data/xml/)');
    const dirList=await dirResp.json();
    const xmlFiles=dirList.filter(f=>f.name.toLowerCase().endsWith('.xml'));
    if(!xmlFiles.length)throw new Error('Ei XML-tiedostoja kansiossa data/xml/');

    // 3. Fetch each XML
    const allB={},allAltKeys={};
    for(let i=0;i<xmlFiles.length;i++){
      setState({loadProgress:`Ladataan XML ${i+1}/${xmlFiles.length}...`});
      const xResp=await fetch(xmlFiles[i].download_url,{cache:'no-store'});
      const xText=await xResp.text();
      const boxes=pXML(xText);
      if(boxes._altKeys){Object.assign(allAltKeys,boxes._altKeys);delete boxes._altKeys}
      for(const[sscc,items]of Object.entries(boxes)){if(!allB[sscc])allB[sscc]=[];
        items.forEach(item=>{const e=allB[sscc].find(i=>i.vnr===item.vnr);if(e)e.qty+=item.qty;else allB[sscc].push({...item})})}
    }

    // 4. Validate
    let tp=0,wl=0,wo=0;
    for(const[,items]of Object.entries(allB)){items.forEach(item=>{tp++;
      const vnr=String(item.vnr||''),alt=String(item.altVnr||'');
      const m=master[vnr]||master[vnr.replace(/^0+/,'')]||(alt?master[alt]||master[alt.replace(/^0+/,'')]:null);
      if(pLoc((m?.location||'').trim()))wl++;else wo++})}

    setState({xmlBoxes:allB,boxAltKeys:allAltKeys,masterData:master,phase:'scan',loadProgress:null,
      loadInfo:`${xmlFiles.length} XML, ${Object.keys(allB).length} laatikkoa, ${tp} tuotetta — ${wl} paikalla, ${wo} ilman`});
  }catch(e){setState({error:'Virhe: '+e.message,loadProgress:null})}
}

      for(const[sscc,items]of Object.entries(boxes)){if(!allB[sscc])allB[sscc]=[];
        items.forEach(item=>{const e=allB[sscc].find(i=>i.vnr===item.vnr);if(e)e.qty+=item.qty;else allB[sscc].push({...item})})}}
    let tp=0,wl=0,wo=0;
    for(const[,items]of Object.entries(allB)){items.forEach(item=>{tp++;
      const vnr=String(item.vnr||''),alt=String(item.altVnr||'');
      const m=master[vnr]||master[vnr.replace(/^0+/,'')]||(alt?master[alt]||master[alt.replace(/^0+/,'')]:null);

    setState({xmlBoxes:allB,boxAltKeys:allAltKeys,masterData:master,phase:'scan',loadProgress:null,

// Direct box add by known SSCC (from picker)
function addBoxDirect(sscc){
  if(!sscc||!S.xmlBoxes[sscc])return;
  if(S.scannedBoxes.some(b=>b.sscc===sscc)){setState({error:'Laatikko jo skannattu',pendingSSCC:null});return}
  const boxItems=S.xmlBoxes[sscc];S.scannedBoxes.push({sscc,items:boxItems});
  const enriched=[];
  boxItems.forEach(item=>{const vnr=String(item.vnr||''),alt=String(item.altVnr||'');
    const m=lookupMaster(vnr,alt),locStr=(m.location||'').trim();
    const pl=pLoc(locStr),pa=pl?gPA(pl):null,cp=pa?cartPos(pa):0;
    enriched.push({vnr,altVnr:alt,name:item.name||m.name||'?',ean:m.ean||'',qty:item.qty,location:pl?locStr:null,parsedLoc:pl,physAisle:pa,cartPos:cp})});
  camStop();setState({scannedBoxes:S.scannedBoxes,activeBox:{sscc,items:boxItems,enriched},scanMode:'scanner',lastScanResult:null,pendingSSCC:null});
}

function addBox(code){
  if(!code)return;setState({error:null,lastScanResult:null});
  // Try direct match, then endsWith, then altKeys
  let sscc=S.xmlBoxes[code]?code:Object.keys(S.xmlBoxes).find(k=>k.endsWith(code)||code.endsWith(k));
  if(!sscc&&S.boxAltKeys){
    const mapped=S.boxAltKeys[code];
    if(mapped&&S.xmlBoxes[mapped])sscc=mapped;
  }
  // Fallback: if 18-20 digit code (SSCC) not found, check unscanned boxes
  if(!sscc&&code.length>=18&&/^\d+$/.test(code)){
    const unscanned=Object.keys(S.xmlBoxes).filter(k=>!S.scannedBoxes.some(b=>b.sscc===k));
    if(unscanned.length===1){
      // Only one unscanned box left — auto-match
      sscc=unscanned[0];
    } else if(unscanned.length>1){
      // Show picker
      setState({error:null,pendingSSCC:code,lastScanResult:{type:'fail',text:'SSCC ei löydy XML:stä. Valitse laatikko alta.'}});
      return;
    }
  }
  if(!sscc){setState({error:`Koodi "${code.length>8?'...'+code.slice(-8):code}" ei löydy`,lastScanResult:{type:'fail',text:'Ei löydy'}});return}
  if(S.scannedBoxes.some(b=>b.sscc===sscc)){setState({error:'Laatikko jo skannattu',lastScanResult:{type:'fail',text:'Jo skannattu'}});return}
  const boxItems=S.xmlBoxes[sscc];S.scannedBoxes.push({sscc,items:boxItems});
  const enriched=[];
  boxItems.forEach(item=>{const vnr=String(item.vnr||''),alt=String(item.altVnr||'');
    const m=lookupMaster(vnr,alt),locStr=(m.location||'').trim();
    const pl=pLoc(locStr),pa=pl?gPA(pl):null,cp=pa?cartPos(pa):0;
    enriched.push({vnr,altVnr:alt,name:item.name||m.name||'?',ean:m.ean||'',qty:item.qty,location:pl?locStr:null,parsedLoc:pl,physAisle:pa,cartPos:cp})});
  camStop();setState({scannedBoxes:S.scannedBoxes,activeBox:{sscc,items:boxItems,enriched},scanMode:'scanner',lastScanResult:null});
}

function buildRoute(){
  camStop();const all=enrichItems(S.scannedBoxes);
  const matched=all.filter(i=>i.parsedLoc&&i.parsedLoc.type!=='rx');
  const rx=all.filter(i=>i.parsedLoc&&i.parsedLoc.type==='rx');
  const unmatched=all.filter(i=>!i.parsedLoc);
  setState({routeItems:sSort(matched),unmatchedItems:unmatched,rxItems:rx,shelved:{},currentIdx:0,phase:'shelve',scanMode:'scanner',lastScanResult:null,confirmedLoc:null});
}

function confirmLocation(code){
  if(!code)return;setState({error:null,lastScanResult:null});
  const cur=S.routeItems[S.currentIdx];if(!cur||!cur.location)return;
  const scanned=code.trim().toUpperCase(),expected=cur.location.trim().toUpperCase();
  if(scanned===expected){setState({confirmedLoc:expected,lastScanResult:{type:'ok',text:'✓ Oikea paikka: '+cur.location},scanMode:'scanner'});return}
  const oi=S.routeItems.findIndex(it=>it.location&&it.location.trim().toUpperCase()===scanned);
  if(oi!==-1){setState({confirmedLoc:scanned,currentIdx:oi,lastScanResult:{type:'ok',text:'✓ Paikka: '+S.routeItems[oi].location},scanMode:'scanner'});return}
  setState({error:`Paikka "${code}" ei ole reitillä`,lastScanResult:{type:'fail',text:'Väärä paikka'}});
}

function confirmEan(code){
  if(!code)return;setState({error:null,lastScanResult:null});
  if(!S.confirmedLoc){setState({error:'Skannaa ensin varastopaikka',lastScanResult:{type:'fail',text:'Skannaa paikka ensin'}});return}
  const cur=S.routeItems[S.currentIdx];
  const match=(item,c)=>{if(!item.ean||item.ean==='null')return!1;return item.ean===c||c.endsWith(item.ean)||item.ean.endsWith(c)};
  if(cur&&match(cur,code)){const p=S.shelved[cur.vnr]||0;pushUndo({type:'shelve',vnr:cur.vnr,prevQty:p,idx:S.currentIdx,name:cur.name});S.shelved[cur.vnr]=p+1;
    setState({shelved:S.shelved,lastScanResult:{type:'ok',text:'✓ Kuitattu '+(p+1)+'/'+cur.qty}});return}
  const sli=S.routeItems.findIndex(it=>it.location&&it.location.trim().toUpperCase()===S.confirmedLoc&&match(it,code));
  if(sli!==-1){const o=S.routeItems[sli],p=S.shelved[o.vnr]||0;
    if(p<o.qty){pushUndo({type:'shelve',vnr:o.vnr,prevQty:p,idx:sli,name:o.name});S.shelved[o.vnr]=p+1;setState({shelved:S.shelved,currentIdx:sli,lastScanResult:{type:'ok',text:'✓ '+esc(o.name)+' '+(p+1)+'/'+o.qty}});return}
    setState({error:esc(o.name)+' — jo valmis',lastScanResult:{type:'fail',text:'Jo hyllytetty'}});return}
  const oi=S.routeItems.findIndex(it=>match(it,code));
  if(oi!==-1){setState({error:'⚠ Tuote on paikassa '+(S.routeItems[oi].location||'?')+'. Skannaa oikea paikka.',lastScanResult:{type:'fail',text:'Väärä paikka'}});return}
  setState({error:'EAN "'+code+'" ei vastaa mitään tuotetta',lastScanResult:{type:'fail',text:'EAN ei tunnistettu'}});
}

// Manual qty adjustment
function adjustQty(vnr,delta){
  const prev=S.shelved[vnr]||0;
  const cur=Math.max(0,prev+delta);
  if(cur!==prev){const item=S.routeItems.find(i=>i.vnr===vnr);pushUndo({type:'shelve',vnr,prevQty:prev,idx:S.currentIdx,name:item?.name||vnr})}
  S.shelved[vnr]=cur;
  setState({shelved:S.shelved,lastScanResult:null});
}
function setQtyManual(vnr){
  const inp=document.getElementById('qty-manual-'+vnr);
  if(!inp)return;const v=parseInt(inp.value,10);
  if(!isNaN(v)&&v>=0){const prev=S.shelved[vnr]||0;if(v!==prev){const item=S.routeItems.find(i=>i.vnr===vnr);pushUndo({type:'shelve',vnr,prevQty:prev,idx:S.currentIdx,name:item?.name||vnr})}S.shelved[vnr]=v;setState({shelved:S.shelved,lastScanResult:null})}
}

function switchScanMode(mode,callback){
  camStop();S.scanMode=mode;S.lastScanResult=null;
  if(mode==='camera'&&document.activeElement)document.activeElement.blur();
  render();
  if(mode==='camera')setTimeout(()=>camStart(callback),100);
  else if(mode==='scanner')setTimeout(refocusScanner,100);
  else setTimeout(()=>{const inp=document.querySelector('.scan-input');if(inp)inp.focus()},100);
}
function navTo(idx){
  if(idx<0||idx>=S.routeItems.length)return;
  const cur=S.routeItems[S.currentIdx],next=S.routeItems[idx];
  const cl=cur?.location?.trim().toUpperCase()||'',nl=next?.location?.trim().toUpperCase()||'';
  camStop();setState({currentIdx:idx,confirmedLoc:cl===nl&&S.confirmedLoc===cl?S.confirmedLoc:null,lastScanResult:null,error:null,scanMode:'scanner'});
}

function finishShelving(skipConfirm){
  if(!skipConfirm){
    const ts=tShelved(),tq=tQty();
    const msg=ts<tq?`Hyllytys on kesken (${ts}/${tq}). Haluatko silti lopettaa ja siirtyä raporttiin?`:'Haluatko lopettaa hyllytyksen ja siirtyä raporttiin?';
    if(!confirm(msg))return;
  }
  setState({phase:'report'});
}

  return`

// Global keydown fallback: if scanner sends data while no input is focused, capture it
let _scanBuffer='',_scanTimer=null;
document.addEventListener('keydown',function(e){
  // Only in scanner mode and not when typing in a real input
  if(S.scanMode!=='scanner'||S.phase==='setup'||S.phase==='report')return;
  const tag=document.activeElement?.tagName;
  if(tag==='INPUT'||tag==='TEXTAREA')return; // Let focused input handle it
  
  if(e.key==='Enter'&&_scanBuffer.length>3){
    e.preventDefault();
    const code=_scanBuffer;_scanBuffer='';
    clearTimeout(_scanTimer);
    // Determine which callback to use
    if(S.phase==='scan')addBox(code);
    else if(S.phase==='shelve'&&!S.confirmedLoc)confirmLocation(code);
    else if(S.phase==='shelve')confirmEan(code);
  } else if(e.key.length===1&&!e.ctrlKey&&!e.metaKey){
    _scanBuffer+=e.key;
    clearTimeout(_scanTimer);
    _scanTimer=setTimeout(()=>{_scanBuffer=''},300); // Reset after 300ms idle
  }
});

        const unscanned=Object.keys(S.xmlBoxes).filter(k=>!S.scannedBoxes.some(b=>b.sscc===k));
        return`<div style="margin-top:8px;padding:10px;border-radius:8px;background:#eff6ff;border:1px solid #bfdbfe">
          <div style="font-size:12px;font-weight:600;color:#1e40af;margin-bottom:6px">Valitse oikea laatikko:</div>
          ${unscanned.map(k=>{const items=S.xmlBoxes[k];
            return`<div onclick="S.pendingSSCC=null;addBoxDirect('${k}')" style="padding:8px 10px;border-radius:6px;margin-bottom:4px;background:#fff;border:1px solid #e2e8f0;cursor:pointer;font-size:12px">
              <span class="mono" style="color:#64748b">...${k.slice(-8)}</span> — ${items.length} tuotetta / ${items.reduce((s,i)=>s+i.qty,0)} kpl
            </div>`}).join('')}
          <button class="btn-sm btn-outline" style="width:100%;margin-top:4px" onclick="setState({pendingSSCC:null,lastScanResult:null})">Peruuta</button>
        </div>`})():''}</div>
    ${S.scannedBoxes.length?`<div class="card"><h2>Skannatut (${S.scannedBoxes.length})</h2>
      <div style="font-size:13px;color:#475569;margin-bottom:12px">${ti} tuotetta, ${tp} kpl</div>
      ${S.scannedBoxes.map((b,i)=>`<div class="scanned-box" onclick="showBoxDetail('${b.sscc}')" style="cursor:pointer">
        <div><span style="font-size:12px;font-weight:600">Laatikko ${i+1}</span><span class="mono" style="margin-left:8px;color:#64748b">...${b.sscc.slice(-6)}</span></div>
        <div style="font-size:12px;color:#475569">${b.items.length} tuot. / ${b.items.reduce((s,i)=>s+i.qty,0)} kpl →</div></div>`).join('')}
      <button class="btn" style="margin-top:8px" onclick="buildRoute()">Muodosta hyllytysjärjestys →</button></div>`:''}`;
    setTimeout(()=>{if(S.scanMode==='camera'){const cb=S.phase==='scan'?addBox:(S.confirmedLoc?confirmEan:confirmLocation);camStart(cb)}else{refocusScanner()}},100);return}

  /* ── SHELVE ── */
  if(S.phase==='shelve'){
    const ts=tShelved(),tq=tQty(),pct=tq>0?Math.round(ts/tq*100):0;
    const cur=S.routeItems[S.currentIdx],cc=cur?(S.shelved[cur.vnr]||0):0,cd=cur?cc>=cur.qty:!1;

    if(!cur){finishShelving(true);return}

    const cpColor=CZ.find(z=>z.pos===cur.cartPos)?.color||'#64748b';
    const locMatch=S.confirmedLoc&&cur.location&&cur.location.trim().toUpperCase()===S.confirmedLoc;

    app.innerHTML=`
      <div class="mb-12">
        <div class="flex justify-between" style="font-size:12px;color:#475569;margin-bottom:4px"><span>${ts}/${tq} hyllytetty</span><span>${pct}%</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>

      ${S.unmatchedItems.length?`<div class="card" style="border-left:4px solid #f59e0b;background:#fffbeb">
        <div style="font-size:13px;font-weight:700;color:#92400e;margin-bottom:6px">⚠ UUSI-hyllyyn (${S.unmatchedItems.length})</div>
        ${S.unmatchedItems.map(i=>`<div style="font-size:12px;color:#78350f;padding:2px 0">${esc(i.name)} — ${i.qty} kpl</div>`).join('')}</div>`:''}

      ${S.rxItems.length?`<div class="card" style="border-left:4px solid #b91c1c;background:#fef2f2">
        <div style="font-size:13px;font-weight:700;color:#b91c1c;margin-bottom:6px">💊 Reseptilääkkeet → lääkekaappiin (${S.rxItems.length})</div>
        ${S.rxItems.map(i=>`<div style="font-size:12px;color:#7f1d1d;padding:2px 0">${esc(i.name)} — ${i.qty} kpl → <strong>${i.location}</strong></div>`).join('')}</div>`:''}

      <div class="card" style="border-left:4px solid ${cpColor}">
        <div class="flex justify-between items-center mb-8">
          <div class="flex items-center gap-8">${cBadge(cur.cartPos)}<span style="font-size:12px;color:#64748b">Paikka ${cur.cartPos}</span></div>
          <span style="font-size:12px;color:#94a3b8">${S.currentIdx+1}/${S.routeItems.length}</span></div>
        ${cur.parsedLoc?`<div class="flex items-center gap-8 mb-6"><span class="${bCls(cur.parsedLoc.aisle)}">${cur.parsedLoc.aisle}</span>
          <span class="location-big">${cur.location}</span></div>`:''}
        <div style="font-size:15px;font-weight:600;margin-bottom:4px">${esc(cur.name)}</div>
        <div class="mono" style="color:#64748b;margin-bottom:10px">VNR ${cur.vnr}${cur.ean&&cur.ean!=='null'?' | EAN '+cur.ean:''}</div>
        <div class="qty-display" style="background:${cd?'#f0fdf4':'#f8fafc'};border:2px solid ${cd?'#86efac':'#e2e8f0'}">
          <span class="qty-count" style="color:${cd?'#16a34a':'#1e293b'}">${cc}</span>
          <span class="qty-sep">/</span><span class="qty-total">${cur.qty}</span>
          ${cd?'<span style="font-size:24px;margin-left:8px">✓</span>':''}</div>
        <div class="qty-adj">
          <button class="qty-btn minus" onclick="adjustQty('${cur.vnr}',-1)">−</button>
          <input type="number" id="qty-manual-${cur.vnr}" class="qty-manual" value="${cc}" min="0"
            onchange="setQtyManual('${cur.vnr}')" onkeydown="if(event.key==='Enter')setQtyManual('${cur.vnr}')">
          <button class="qty-btn plus" onclick="adjustQty('${cur.vnr}',1)">+</button>
        </div>
      </div>

      <div class="card">
        ${!locMatch?`
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
            <div style="width:28px;height:28px;border-radius:50%;background:#f59e0b;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0">1</div>
            <div class="label" style="margin:0">Skannaa varastopaikka</div></div>
          <div style="padding:10px;border-radius:8px;background:#fffbeb;border:1px solid #fde68a;font-size:13px;color:#92400e;margin-bottom:10px;text-align:center">
            Varmista: <strong>${cur.location}</strong></div>
          ${scanUI(confirmLocation,'Varastopaikka')}`
        :`
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
            <div style="width:28px;height:28px;border-radius:50%;background:#16a34a;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0">✓</div>
            <div style="font-size:12px;color:#16a34a;font-weight:600">Paikka ${cur.location} vahvistettu</div></div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
            <div style="width:28px;height:28px;border-radius:50%;background:#3b82f6;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0">2</div>
            <div class="label" style="margin:0">Skannaa tuotteen EAN</div></div>
          ${scanUI(confirmEan,'EAN-koodi')}`}
        ${S.lastScanResult?`<div class="scan-result ${S.lastScanResult.type==='ok'?'scan-ok':'scan-fail'}">${S.lastScanResult.text}</div>`:''}
        ${S.error?`<div class="error">${S.error}</div>`:''}</div>

      <div class="flex gap-8 mb-12">
        <button class="btn-sm btn-outline flex-1" ${S.currentIdx===0?'disabled':''} onclick="navTo(S.currentIdx-1)">← Edellinen</button>
        <button class="btn-sm flex-1" style="background:${undoStack.length?'#fef3c7':'#f1f5f9'};color:${undoStack.length?'#92400e':'#cbd5e1'};border:none" ${undoStack.length?'':'disabled'} onclick="popUndo()">↩ Peru</button>
        <button class="btn-sm btn-outline flex-1" ${S.currentIdx>=S.routeItems.length-1?'disabled':''} onclick="navTo(S.currentIdx+1)">Seuraava →</button></div>

      <button class="btn" style="background:#16a34a;margin-bottom:12px" onclick="finishShelving()">Lopeta hyllytys → Raportti</button>

      <details class="card"><summary>Koko reitti (${S.routeItems.length})</summary>
        <div style="max-height:400px;overflow-y:auto">
          ${S.routeItems.map((item,idx)=>{const done=(S.shelved[item.vnr]||0)>=item.qty,isCur=idx===S.currentIdx;
            return`<div class="route-item ${isCur?'current':''} ${done&&!isCur?'completed':''}" onclick="navTo(${idx})">
              <div class="flex items-center gap-6" style="flex:1;min-width:0">${cBadge(item.cartPos)}
                <div style="min-width:0"><div class="route-item-name">${esc(item.name)}</div><div class="route-item-loc">${item.location||'—'}</div></div></div>
              <div style="font-size:12px;font-weight:700;white-space:nowrap;margin-left:8px;color:${done?'#16a34a':'#1e293b'}">${S.shelved[item.vnr]||0}/${item.qty}${done?' ✓':''}</div></div>`}).join('')}
        </div></details>`;
    setTimeout(()=>{if(S.scanMode==='camera'){const cb=S.phase==='scan'?addBox:(S.confirmedLoc?confirmEan:confirmLocation);camStart(cb)}else{refocusScanner()}},100);return}

  /* ── REPORT ── */
  if(S.phase==='report'){
    camStop();
    const ok=[],under=[],over=[],notShelved=[];
    S.routeItems.forEach(item=>{
      const s=S.shelved[item.vnr]||0;
      if(s===item.qty)ok.push({...item,shelvedQty:s});
      else if(s>item.qty)over.push({...item,shelvedQty:s});
      else if(s>0)under.push({...item,shelvedQty:s});
      else notShelved.push({...item,shelvedQty:0});
    });
    const ts=tShelved(),tq=tQty();
    const hasDeviations=under.length||over.length||notShelved.length||S.unmatchedItems.length||S.rxItems.length;

    app.innerHTML=`
      <div class="card">
        <h1>Hyllytysraportti</h1>
        <p class="sub">${new Date().toLocaleDateString('fi-FI')} ${new Date().toLocaleTimeString('fi-FI',{hour:'2-digit',minute:'2-digit'})}</p>
        <div class="flex gap-8" style="margin-bottom:16px">
          <div style="flex:1;padding:10px;border-radius:8px;background:#f0fdf4;text-align:center">
            <div style="font-size:22px;font-weight:700;color:#16a34a">${ts}</div><div style="font-size:11px;color:#047857">Hyllytetty</div></div>
          <div style="flex:1;padding:10px;border-radius:8px;background:#f8fafc;text-align:center">
            <div style="font-size:22px;font-weight:700">${tq}</div><div style="font-size:11px;color:#64748b">Odotettu</div></div>
          <div style="flex:1;padding:10px;border-radius:8px;background:${ts===tq?'#f0fdf4':'#fef2f2'};text-align:center">
            <div style="font-size:22px;font-weight:700;color:${ts===tq?'#16a34a':'#dc2626'}">${ts-tq}</div><div style="font-size:11px;color:#64748b">Erotus</div></div>
        </div>
      </div>

      ${hasDeviations?`<div class="card">
        <h2 style="color:#dc2626">Poikkeamat</h2>

        ${under.length?`<div style="font-size:13px;font-weight:600;color:#92400e;margin:12px 0 6px">Vajaita (${under.length})</div>
          ${under.map(i=>`<div class="report-row report-warn">
            <div style="min-width:0"><div style="font-weight:600;font-size:12px">${esc(i.name)}</div><div class="mono" style="color:#64748b">${i.location||'—'}</div></div>
            <div style="white-space:nowrap;font-weight:700;color:#92400e">${i.shelvedQty}/${i.qty} <span style="font-size:11px;color:#b45309">(−${i.qty-i.shelvedQty})</span></div></div>`).join('')}`:''}

        ${notShelved.length?`<div style="font-size:13px;font-weight:600;color:#dc2626;margin:12px 0 6px">Ei hyllytetty (${notShelved.length})</div>
          ${notShelved.map(i=>`<div class="report-row report-err">
            <div style="min-width:0"><div style="font-weight:600;font-size:12px">${esc(i.name)}</div><div class="mono" style="color:#64748b">${i.location||'—'}</div></div>
            <div style="white-space:nowrap;font-weight:700;color:#dc2626">0/${i.qty}</div></div>`).join('')}`:''}

        ${over.length?`<div style="font-size:13px;font-weight:600;color:#7c3aed;margin:12px 0 6px">Ylimäärä (${over.length})</div>
          ${over.map(i=>`<div class="report-row" style="background:#f5f3ff;border:1px solid #ddd6fe">
            <div style="min-width:0"><div style="font-weight:600;font-size:12px">${esc(i.name)}</div><div class="mono" style="color:#64748b">${i.location||'—'}</div></div>
            <div style="white-space:nowrap;font-weight:700;color:#7c3aed">${i.shelvedQty}/${i.qty} <span style="font-size:11px">(+${i.shelvedQty-i.qty})</span></div></div>`).join('')}`:''}

        ${S.unmatchedItems.length?`<div style="font-size:13px;font-weight:600;color:#92400e;margin:12px 0 6px">UUSI-hyllyyn (${S.unmatchedItems.length})</div>
          ${S.unmatchedItems.map(i=>`<div class="report-row report-warn">
            <div style="font-weight:600;font-size:12px">${esc(i.name)}</div>
            <div style="white-space:nowrap;font-weight:700">${i.qty} kpl</div></div>`).join('')}`:''}

        ${S.rxItems.length?`<div style="font-size:13px;font-weight:600;color:#b91c1c;margin:12px 0 6px">Reseptilääkkeet → lääkekaappi (${S.rxItems.length})</div>
          ${S.rxItems.map(i=>`<div class="report-row report-err">
            <div style="min-width:0"><div style="font-weight:600;font-size:12px">${esc(i.name)}</div><div class="mono" style="color:#64748b">${i.location}</div></div>
            <div style="white-space:nowrap;font-weight:700">${i.qty} kpl</div></div>`).join('')}`:''}
      </div>`:`<div class="card" style="text-align:center;padding:24px">
        <div style="font-size:36px;margin-bottom:8px">✓</div>
        <h2 style="color:#16a34a">Ei poikkeamia</h2></div>`}

      ${ok.length?`<details class="card"><summary style="color:#16a34a">Hyllytetty OK (${ok.length})</summary>
        ${ok.map(i=>`<div class="report-row report-ok">
          <div style="min-width:0"><div style="font-weight:600;font-size:12px">${esc(i.name)}</div><div class="mono" style="color:#64748b">${i.location||'—'}</div></div>
          <div style="white-space:nowrap;font-weight:700;color:#16a34a">${i.qty} kpl ✓</div></div>`).join('')}</details>`:''}

      <button class="btn" style="margin-top:8px" onclick="clearSavedState();undoStack=[];camStop();setState({phase:'scan',scannedBoxes:[],routeItems:[],unmatchedItems:[],rxItems:[],shelved:{},currentIdx:0,scanMode:'scanner',lastScanResult:null,confirmedLoc:null,activeBox:null})">Uusi erä</button>`;
  }
}
// Show restore banner or normal render
if(wasRestored){
  render();
  // Show brief notification
  const nb=document.createElement('div');
  nb.style.cssText='position:fixed;top:0;left:0;right:0;padding:10px;background:#eff6ff;border-bottom:2px solid #3b82f6;text-align:center;font-size:13px;font-weight:600;color:#1e40af;z-index:999';
  nb.innerHTML='✓ Edellinen hyllytyserä palautettu <button onclick="this.parentElement.remove()" style="margin-left:12px;background:#3b82f6;color:#fff;border:none;padding:4px 12px;border-radius:6px;font-size:12px;cursor:pointer">OK</button> <button onclick="clearSavedState();location.reload()" style="margin-left:4px;background:#e2e8f0;color:#475569;border:none;padding:4px 12px;border-radius:6px;font-size:12px;cursor:pointer">Aloita alusta</button>';
  document.body.prepend(nb);
} else {
  render();
}
</script>
</body>
</html>
